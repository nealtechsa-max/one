    .mom-hero {
      background:

      margin: 2.5rem 0;
    }

    .stat-card {
      background: white;
      border-radius: 1rem;
      padding: 1.5rem 1rem;
      text-align: center;
      border: 1px solid var(--gold-light);
      box-shadow: 0 3px 12px var(--shadow);
    }

    .stat-card .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--deep-rose);
      display: block;
      line-height: 1;
    }

    .stat-card .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
      display: block;
    }

    .mom-moment {
      background: white;
      border-radius: 1.25rem;
      padding: 2rem;
      border-left: 4px solid var(--rose);
      box-shadow: 0 4px 18px var(--shadow);
      margin-bottom: 1.5rem;
    }

    .mom-moment .mm-tag {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-bottom: 0.5rem;
    }

    .mom-moment h4 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--deep-rose);
      margin-bottom: 0.75rem;
    }

    .mom-moment p {
      font-size: 0.95rem;
      color: var(--charcoal);
      line-height: 1.85;
      margin: 0;
    }

    .reasons-list {
      counter-reset: reasons;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 2rem 0;
    }

    .reasons-list li {
      background: white;
      border-radius: 1rem;
      padding: 1.25rem 1.5rem 1.25rem 4.5rem;
      border: 1px solid var(--gold-light);
      box-shadow: 0 2px 10px var(--shadow);
      font-size: 1rem;
      line-height: 1.7;
      color: var(--charcoal);
      position: relative;
      counter-increment: reasons;
    }

    .reasons-list li::before {
      content: counter(reasons, decimal-leading-zero);
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--blush);
      font-weight: 700;
    }

    .split-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
      align-items: center;
    }

    @media (max-width: 640px) {
      .split-section { grid-template-columns: 1fr; gap: 1.5rem; }
    }

    .split-photo {
      border-radius: 1.25rem;
      overflow: hidden;
      box-shadow: 0 8px 32px var(--shadow);
    }

    .split-photo img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
    }

    .to-the-kids {
      background: linear-gradient(135deg, var(--deep-rose) 0%, var(--rose) 100%);
      color: white;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 12px 40px rgba(6, 90, 78, 0.3);
      margin: 3rem 0;

    .to-the-kids h3 {

      font-size: clamp(1.4rem, 3vw, 2rem);
      color: white;
      margin-bottom: 1.25rem;
    }

      font-size: 1rem;
      line-height: 1.85;
      color: rgba(255,255,255,0.88);
      max-width: 560px;
      margin: 0 auto;
    }

    .to-the-kids p + p { margin-top: 1rem; }

    .crown-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .promise-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }

    .promise-card {
      background: linear-gradient(145deg, white, var(--cream));
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid var(--gold-light);
      box-shadow: 0 3px 14px var(--shadow);

      font-size: 1rem;
      color: var(--deep-rose);
      margin-bottom: 0.4rem;
    }
    .promise-card p { font-size: 0.85rem; color: var(--muted); margin: 0; line-height: 1.65; }

    .big-mom-quote {
      background: var(--cream);
      border: 1px solid var(--gold-light);
      border-radius: 1.5rem;
      padding: 3rem;
      text-align: center;
      margin: 3rem 0;
    }

      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.4rem, 3vw, 2.1rem);
      color: var(--deep-rose);
      line-height: 1.5;
      margin: 0 0 1rem;
    }

    .big-mom-quote cite {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-style: normal;
    }
  </style>
</head>

  <script>
    const PAGE_DATE = { year: 2026, month: 5, day: 9 };
    const UNLOCK = new Date(PAGE_DATE.year, PAGE_DATE.month - 1, PAGE_DATE.day, 0, 0, 0);

    function isUnlocked() { return new Date() >= UNLOCK || localStorage.getItem('tjpreview') === '4031'; }

    function countdown() {
      const diff = UNLOCK - new Date();
      if (diff <= 0) return null;
      return {
        h: Math.floor(diff / 36e5),
        m: Math.floor((diff % 36e5) / 6e4),
        s: Math.floor((diff % 6e4) / 1e3)
      };
    }

    function buildNav() {
      const nav = document.getElementById('siteNav');
      const pages = [
        { href:'index.html', label:'Home', date:null },
        { href:'may8.html', label:'May 8', date:{ year:2026,month:5,day:8 } },
        { href:'may9.html', label:'May 9', date:{ year:2026,month:5,day:9 } },
        { href:'may10.html', label:'May 10', date:{ year:2026,month:5,day:10 } }
      ];
      pages.forEach(p => {
        const a = document.createElement('a');
        a.href = p.href;
        a.textContent = p.label;
        if (p.date) {
          const ul = new Date(p.date.year, p.date.month-1, p.date.day);
          if (new Date() < ul) a.classList.add('locked');
        }
        if (window.location.pathname.endsWith('may9.html')) {
          if (p.href === 'may9.html') a.classList.add('active');
        }
        nav.appendChild(a);
      });
    }

    buildNav();

    const content = document.getElementById('pageContent');

    if (!isUnlocked()) {
      content.innerHTML = `
        <div class="locked-page">
          <a href="index.html" style="text-decoration:none;color:var(--muted);font-size:0.8rem;letter-spacing:0.1em;margin-bottom:2rem;display:block;">← Back Home</a>
          <div class="lock-icon">🔒</div>
          <h2>Almost Time…</h2>
          <p class="script" style="font-style:italic;font-size:1.1rem;">This page opens at midnight on May 9th.<br>Worth the wait, I promise.</p>
          <div class="countdown">
            <div class="countdown-block"><span class="num" id="cdH">--</span><span class="label">Hours</span></div>
            <div class="countdown-block"><span class="num" id="cdM">--</span><span class="label">Mins</span></div>
            <div class="countdown-block"><span class="num" id="cdS">--</span><span class="label">Secs</span></div>
          </div>
          <a href="index.html" class="btn" style="margin-top:1rem;">Go Back Home</a>
        </div>`;

      function tick() {
        const c = countdown();
        if (!c) { location.reload(); return; }
        document.getElementById('cdH').textContent = String(c.h).padStart(2,'0');
        document.getElementById('cdM').textContent = String(c.m).padStart(2,'0');
        document.getElementById('cdS').textContent = String(c.s).padStart(2,'0');
      }
      tick();
      setInterval(tick, 1000);

    } else {

      content.innerHTML = `

        <!-- HERO -->
        <div class="hero mom-hero">
          <span class="hero-tag">May 9th &nbsp;✦&nbsp; Day Two</span>
          <h1>To Clarrisa,<br><em class="script">The Most Incredible Mother</em></h1>
          <div class="hero-divider"><span>✦</span></div>
          <p class="hero-sub script">
            "A mother is not a person to lean on, but a person to make leaning unnecessary."<br>
            <span style="font-size:0.85em;">- Dorothy Canfield Fisher</span>
          </p>
        </div>

        <!-- OPENING -->
        <div class="section">
          <span class="section-label">The Truth</span>
          <h2>I Get To Watch You Every Day</h2>

          <div class="letter-wrap">
            <p>
              There is something that happens when you watch someone step into motherhood.

              in the hard moments and the joyful ones. And then a child looks up at them,
              and you realize: you didn't know the half of it.
            </p>
            <p>
              That is what happened to me. I watched you with Trae, with Tayla, with Raizel,

            </p>
            <p>
              You didn't just love them. You <em>chose</em> them, over and over, in every exhausted
              3 a.m., in every scraped knee, in every hard conversation, in every single ordinary
              Tuesday. You chose to show up completely, and you have never stopped.
            </p>
            <p>
              That is who you are. And today, I want to try, knowing I'll fall short, to put

            </p>

        </div>

            <div class="split-photo">

            </div>
            <div>
              <span class="section-label">At Your Core</span>
              <h2 style="font-size:1.8rem;">Three Kids. Three Different Worlds. One Mom Who Shows Up for All of Them.</h2>
              <p>
                Trae brings you his 8-year-old energy, his questions, his need for you to be

              </p>
              <p>

              </p>

        <div class="ornament">✦ ✦ ✦</div>

        <div class="section">
          <span class="section-label">Let Me Count the Ways</span>
          <h2>20 Reasons You Are the Most Incredible Mom</h2>
          <p>I could write 200. I started with 20. Here they are, no filter, straight from my heart.</p>

          <ol class="reasons-list">
            <li>You are <strong>fully present</strong>. When you are with Trae, Tayla, or Raizel, you are actually <em>with them</em>, not halfway somewhere else. They each feel like your whole focus. That is a gift not every parent can give.</li>
            <li>You <strong>know each of them individually</strong>. Trae's sense of humor. Tayla's quiet depth. Raizel's strength. You don't see them as a group, you see three completely different people, and you love all three of them in the exact way each one needs.</li>
            <li>You <strong>celebrate the small things</strong>. Trae's drawing. Tayla's playlist. Raizel's wins. You treat the little things like they matter, because to you, and to them, they do.</li>
            <li>You are <strong>patient in the moments that would break anyone else</strong>. I've watched you breathe through an 8-year-old's meltdown, navigate a 12-year-old's eye roll, and still have grace left over. I have been genuinely in awe.</li>
            <li>You <strong>apologize when you're wrong</strong>, even to the kids. You teach them that love means accountability, that even moms are human. That lesson will travel with them for the rest of their lives.</li>
            <li>You <strong>advocate ferociously</strong>. You will walk into any room, call any school, face any person, fight any fight to make sure Trae and Tayla are seen, heard, and protected. Every time.</li>
            <li>You <strong>teach by living it</strong>. Your work ethic, your compassion, your discipline, your curiosity, they are watching all of it. They are becoming it. You are their blueprint.</li>
            <li>You <strong>read the room</strong>. You know when Trae needs a distraction, when Tayla needs space, when Raizel needs you to just listen without fixing. That emotional intelligence is a superpower.</li>
            <li>You <strong>make ordinary days feel like something</strong>. A regular Tuesday with you is a fort in the living room, a spontaneous trip, a kitchen dance party at 7pm because the song came on. You make life feel like it's worth showing up for.</li>
            <li>You <strong>love them through the hard phases</strong>. The tantrums. The attitude. The silence. The pushback. You don't love them less in those moments. You lean in harder. Every single time.</li>
            <li>You <strong>encourage who they actually are</strong>. You don't try to shape them into what you want, you create space for them to discover themselves, and then you celebrate exactly that person. That is a rare and beautiful form of love.</li>
            <li>You <strong>balance warmth and structure</strong> in a way that takes real wisdom. They know they're safe. They also know there are standards. That combination produces children who are both confident and kind.</li>
            <li>You <strong>take care of yourself</strong>, your yoga, your books, your stillness, and in doing so, you model something critical: that their mother matters too. That self-respect is not selfish. That is a lesson that will serve them forever.</li>
            <li>You <strong>make them feel safe enough to be scared</strong>. They come to you with the real stuff. That only happens because you have built yourself into a safe place, over and over, without flinching.</li>
            <li>You <strong>carry the mental load</strong> and make it look effortless. The appointments. The schedules. Who needs what when. The emotional state of three kids simultaneously. You manage it all with a capability that leaves me speechless.</li>
            <li>You <strong>show Tayla what a woman looks like</strong>. A woman who works hard, who holds her ground, who leads with heart, who loves her family without losing herself. Tayla is watching. And she is becoming something extraordinary because of what she sees.</li>
            <li>You <strong>show Trae what love looks like</strong>. How a woman should be treated. What effort looks like. What presence looks like. Everything he will one day bring into his own relationships, he is learning right now from watching you.</li>
            <li>You are <strong>their biggest cheerleader</strong>. In the audience, on the sideline, at the kitchen table, you are there with your whole heart, believing in them before they believe in themselves.</li>
            <li>You <strong>love their father</strong> in a way that shows them what love should look like. The way we love each other is the blueprint they'll carry into their own lives. That gift is immeasurable.</li>
            <li>You <strong>will never fully understand the impact you are having</strong>. The confidence, the security, the sense of self that Trae, Tayla, and Raizel are growing, that is your doing. That is your legacy. And it is breathtaking.</li>
          </ol>
        </div>

        <!-- BIG QUOTE -->
        <div class="big-mom-quote section" style="padding-top:0">
          <blockquote>
            "The most important thing a father can do for his children<br>
            is love their mother."
          </blockquote>
          <cite>- Theodore Hesburgh</cite>
          <p style="margin-top:1.5rem;font-size:0.95rem;color:var(--charcoal);">
            I love their mother so much. With everything I have.
          </p>
        </div>

        <!-- MOM MOMENTS -->
        <div class="section">
          <span class="section-label">The Moments I Won't Forget</span>
          <h2>Scenes I Carry With Me</h2>

          <div class="mom-moment">

            <h4>The way he looks for you first</h4>
            <p>When something happens, good or bad, funny or scary, Trae looks for you first. That is not an accident. That is years of you being the safest place he knows. At 8 years old, he already understands on some level that you are his anchor. Watch that boy. He is going to be something.</p>

        <!-- PHOTO ROW -->
        <div class="section" style="padding-top:0">

        <div class="ornament">✦ ✦ ✦</div>

        <div class="section">

            </p>

              a room and bring warmth with you. If she becomes even half the woman you are,

            </p>
            <p>
              What you gave her, what you <em>give</em> her, is not something small.
              It is the gift of being chosen. Of knowing that someone looked at her and said:

            </p>
            <p>
              I see it. I am grateful for it every single day.
              And I love you more because of it.
            </p>

        <!-- TO THE KIDS CALLOUT -->
        <div class="section" style="padding-top:0">
          <div class="to-the-kids">

            <h3>A Note to Trae, Tayla & Raizel</h3>
            <p>

            </p>
            <p style="margin-top:1.5rem;font-style:italic;color:rgba(255,255,255,0.75);">
             , From your dad, who is so proud of all three of you
            </p>
          </div>
        </div>

        <!-- CLOSING LETTER -->
        <div class="section">
          <span class="section-label">From Me To You</span>
          <h2>What They Don't Know Yet, But Will</h2>
          <div class="letter-wrap">
            <p>
              They don't know yet how lucky they are. They will. When they're older and they see
              the world and they meet other families and they understand that what we have,
              what you have built, is not the norm. It is extraordinary.
            </p>
            <p>
              They'll understand one day what it means to have a mother who was also a nurse,
              who spent her career caring for strangers at their most vulnerable, then came home
              and poured that same care into her family. They'll understand the weight of that.
              The beauty of it.
            </p>

      el.className = 'petal-particle';
      el.textContent = PETALS[Math.floor(Math.random() * PETALS.length)];
      el.style.cssText = `left:${Math.random()*100}%;bottom:-2rem;font-size:${0.6+Math.random()*0.8}rem;animation-duration:${12+Math.random()*16}s;animation-delay:-${Math.random()*20}s;`;
      pc.appendChild(el);
    }
  </script>
</body>
</html>
